name: WEEEK Telegram Bot
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning, midday or evening'
        default: 'morning'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests

      - name: Set BOT_MODE
        run: echo "BOT_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV

      - name: Run bot
        run: python weeek_bot.py
        env:
          WEEEK_TOKEN: ${{ secrets.WEEEK_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          WORKSPACE_ID: ${{ secrets.WORKSPACE_ID }}
          BOT_MODE: ${{ env.BOT_MODE }}
