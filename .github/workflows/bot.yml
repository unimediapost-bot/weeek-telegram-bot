name: WEEEK Telegram Bot
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning, midday or evening'
        default: 'morning'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests

      - name: Set BOT_MODE
        id: set_mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "BOT_MODE=morning" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 12 * * *" ]; then
            echo "BOT_MODE=midday" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" = "0 16 * * *" ]; then
            echo "BOT_MODE=evening" >> $GITHUB_ENV
          else
            echo "BOT_MODE=${{ github.event.inputs.mode || 'morning' }}" >> $GITHUB_ENV
          fi

      - name: Run bot
        run: python weeek_bot.py
        env:
          WEEEK_TOKEN: ${{ secrets.WEEEK_TOKEN }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          WORKSPACE_ID: ${{ secrets.WORKSPACE_ID }}
          BOT_MODE: ${{ env.BOT_MODE }}
